const MNLANG  = ["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"];

function agendaHTML() {
  const nu = new Date(); nu.setHours(0,0,0,0);
  let h = '<div class="agenda-wrapper">', hm = -1, rijen = 0;
  for (let i = 0; i < 14; i++) {
    const d = new Date(nu); d.setDate(nu.getDate()+i);
    const dw=d.getDay(), mn=d.getMonth(), jr=d.getFullYear(), nr=d.getDate();
    const s = `${jr}-${String(mn+1).padStart(2,'0')}-${String(nr).padStart(2,'0')}`;
    const vast = [];
    if (dw === 0) vast.push({ tijd:"11:00", type:"viering", tekst:"Zondagsviering \u2014 Goede Bijstand" });
    if (dw === 6) vast.push({ tijd:"16:30", type:"viering", tekst:"Mis \u2014 Finis Terrae" });
    const evs = [...vast, ...(agendaExtra[s]||[])];
    if (!evs.length) continue;
    rijen++;
    if (mn!==hm){ hm=mn; h+=`<div class="agenda-maand-header">${MNLANG[mn]} ${jr}</div>`; }
    const kl=['agenda-dag',(dw===0||dw===6)?'weekend':'',i===0?'vandaag':''].filter(Boolean).join(' ');
    h+=`<div class="${kl}"><div class="datum-cel">
      <span class="dag-naam">${i===0?'Vandaag':DNKORT[dw]}</span>
      <span class="dag-nr">${nr}</span>
      <span class="maand-kort">${MNKORT[mn]}</span>
    </div><div class="ev-cel">`;
    evs.forEach(ev=>{
      h+=`<div class="evenement"><span class="ev-tijd">${ev.tijd||''}</span><span class="ev-icoon">${EVICON[ev.type]||'\u271D'}</span><span>${ev.tekst}</span></div>`;
    });
    h+='</div></div>';
  }
  if (!rijen) h += '<div style="padding:0.5rem 0.9rem;font-style:italic;color:var(--muted);font-size:0.86rem;">Geen vieringen gepland in de komende twee weken.</div>';
  h+='</div>';
  h+=`<div class="agenda-legenda"><span>\u271D Viering</span><span>\u25C6 Activiteit/Ontmoeting</span><span>\uD83C\uDFB5 Muziek/Concert</span></div>`;
  return h;
}

function openLb(el) {
  const img = (el.tagName==='IMG') ? el : el.querySelector('img');
  if(!img) return;
  document.getElementById('lb-img').src = img.src;
  document.getElementById('lb-cap').textContent = img.dataset.titel||img.alt||'';
  document.getElementById('lightbox').classList.add('open');
}
function sluitLb(){ document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') sluitLb(); });
document.getElementById('lightbox').addEventListener('click', function(e){ if(e.target===this) sluitLb(); });

        <p>Welkom op de website van de gemeenschap De Goede Bijstand, een Nederlandstalige parochie in het hartje van Brussel.</p>
        <p>Misschien bent u benieuwd naar wie we zijn en wat we doen.<br>Misschien wilt u ons een vraag stellen.<br>Misschien zag u ons op tv en bent u op zoek naar een tekst uit de viering.<br>Misschien bent u gewoon op zoek &#8230;</p>

        <p>De vraag is gemakkelijker dan het antwoord. Duidelijk is wel dat we leven en werken vanuit een inspiratie, een krachtbron die we bij elkaar herkennen en die ons verbindt en sterkt.</p>
        <p><strong>Verbinden:</strong> niet in de zin dat wij altijd dezelfde taal spreken, dat wij hetzelfde denken en voelen, dat wij altijd onze antwoorden klaar hebben. Neen, onze gemeenschap is zeer divers en dus moet het wel een open gemeenschap zijn, rijk aan dialoog en discussie.</p>
        <p><strong>Verbinden:</strong> wel in de zin dat ieder probeert op zijn manier woord en daad bij elkaar te brengen in zorg voor elkaar en voor de meest kwetsbaren, individueel of in de vele werkingen en projecten die vanuit de gemeenschap zijn gegroeid of waarmee we nauw samenwerken.</p>
        <p><strong>Verbinden doen we</strong>, jonge mensen met onze gemeenschap, als we samen levensmomenten vieren.</p>
        <p><strong>Verbonden zijn we</strong>, als we vieren in de kring, ongedwongen en geborgen.</p>
        <p><strong>Verbonden zijn we</strong>, als we, ge&#239;nspireerd door Jezus, brood en wijn delen omdat we ook brood en wijn voor elkaar willen zijn.</p>
        <p>Wij mogen hierbij in een lange christelijke traditie van solidariteit en zorg gaan staan die gedragen wordt door de God van leven en belofte, Jahweh: ik ben er, ik zal er zijn voor u.</p>

        <p>Mensen zoeken gemeenschap om te delen, te luisteren, te troosten, te vieren &#8230;<br>Gemeenschap verwelkomt mensen om te delen, te luisteren, te troosten, te vieren &#8230;</p>

        <p>In de gemeenschap krijgt het verbond tussen God en mensen inhoud en vorm. Ge&#239;nspireerd door Jezus van Nazareth delen we kracht, troost en bemoediging.</p>

        <p>Erediensten zijn in 2002 een gewestbevoegdheid geworden inzake de erkenning van plaatselijke gemeenschappen (parochies), de organisatie en financiering van de instellingen belast met het beheer van de temporali&#235;n van de erediensten en de huisvestingstoelagen voor de bedienaren.</p>
        <p>Op 23 december 2021 werd de organieke ordonnantie betreffende het beheer van de materi&#235;le belangen van de erkende plaatselijke levensbeschouwelijke gemeenschappen gepubliceerd in het Belgisch Staatsblad. Zo hervormt het Brussels Hoofdstedelijk Gewest de wettelijke basis voor levensbeschouwelijke instellingen.</p>

  activiteiten: { title:'Activiteiten', content:`
    <section>
      <div class="breadcrumb"><a onclick="navigate('home')">Home</a> <span>&#8250;</span> Activiteiten</div>
      <h2>Activiteiten &amp; Evenementen</h2>
      <div class="act-subnav">
        <a onclick="showActSub('overzicht')" data-asub="overzicht" class="act-actief">Overzicht</a>
        <a onclick="showActSub('fotos')"     data-asub="fotos">&#128247; Foto&#8217;s</a>
      </div>
      <div id="asub-overzicht">
        <h3>Kerstbrief 2025 &mdash; De Kleine Zusters van Jezus</h3>
        <p>De Kleine Zusters van Jezus stuurden ook dit jaar een hartelijke Kerstbrief. Ze leven en werken te midden van de armen en gemarginaliseerden, in de geest van Charles de Foucauld.</p>
        <div class="ornament">&#x2748; &#x2748; &#x2748;</div>
        <h3>Gebed in de geest van Taiz&#233;</h3>
        <p><em>Elke derde zaterdag van de maand, 20.00&nbsp;u &mdash; Kerk van Goede Bijstand</em></p>
        <p>Een moment van gebed, stilte en gezang. Iedereen is welkom. <a onclick="navigate('home')">Bekijk alle datums &#8594;</a></p>
        <img src="${INT}" alt="Kerkinterieur" class="church-photo" style="height:200px;">
        <p class="photo-caption">De kerk &#8217;s avonds &mdash; een plek voor rust en ontmoeting &#169; Jean-Paul Remy / visit.brussels</p>
        <div class="ornament">&#x2748; &#x2748; &#x2748;</div>
        <h3>Bijstand by Night</h3>
        <p><em>Elke vrijdagavond van mei t.e.m. augustus, 18&ndash;22&nbsp;uur</em></p>
        <p>De kerk staat open voor iedereen die wil binnenstappen &mdash; voor stilte, ontmoeting of gewoon even uitblazen. Contacteer <a href="mailto:eheesen@hotmail.com">Nieneke</a> of <a href="mailto:danny.decock59@yahoo.com">Danny</a> voor meer info.</p>
        <div class="ornament">&#x2748; &#x2748; &#x2748;</div>
        <h3>Biechtgesprek, Ziekenzalving, Begrafenis</h3>
        <p>Gelieve contact op te nemen met pastoor Johnny De Mot via <a href="mailto:johnny.demot@viaporta.be">johnny.demot@viaporta.be</a>.</p>
      </div>

        <p style="font-style:italic;color:var(--muted);margin-bottom:1.4rem;">Beeldverslag van de verschillende activiteiten in onze parochie &mdash; van liturgische vieringen tot sociale ontmoetingen en culturele evenementen.</p>

  kinderen: { title:'Kinderen & Jongeren', content:`
    <section>
      <div class="breadcrumb"><a onclick="navigate('home')">Home</a> <span>&#8250;</span> Kinderen &amp; Jongeren</div>
      <h2>Kinderen &amp; Jongeren</h2>
      <p>Elke derde zondag van de maand is er kindernevendienst tijdens de viering van 11 uur. De kinderen gaan apart aan de slag terwijl de volwassenen de eucharistie vieren.</p>
      <div class="kids-grid">
        <div class="kids-card" onclick="navigate('bijtjes')"><div class="icon">&#x1F41D;</div><h3>Goede Bijtjes</h3><p>Voor kinderen van de lagere school. Ze verkennen het geloof via verhalen, knutselen en gesprekken.</p><p><a>Meer info &#8594;</a></p></div>
        <div class="kids-card" onclick="navigate('mosterdzaadjes')"><div class="icon">&#x1F331;</div><h3>Mosterdzaadjes</h3><p>Voor peuters en kleuters. Een zachte introductie tot geloof en gemeenschap.</p><p><a>Meer info &#8594;</a></p></div>
      </div>
      <div class="ornament">&#x2748; &#x2748; &#x2748;</div>
      <h3>Jongeren</h3>
      <p>Via onze samenwerking met <strong>Kamino</strong> &mdash; het jongerennetwerk van de Brusselse katholieke kerk &mdash; zijn er regelmatig activiteiten. <a onclick="navigate('samenwerking')">Meer over Kamino &#8594;</a></p>
    </section>` },

  bijtjes: { title:'Goede Bijtjes', content:`
    <section>
      <div class="breadcrumb"><a onclick="navigate('home')">Home</a> <span>&#8250;</span> <a onclick="navigate('kinderen')">Kinderen &amp; Jongeren</a> <span>&#8250;</span> Goede Bijtjes</div>
      <h2>&#x1F41D; Goede Bijtjes</h2>
      <p>De Goede Bijtjes is de kindernevendienst voor kinderen van de lagere school. Elke derde zondag van de maand gaan ze apart aan de slag tijdens de viering van 11&nbsp;uur.</p>
      <h3>Wat doen we?</h3>
      <p>Via bijbelverhalen, knutselen, spelletjes en gesprekjes ontdekken de kinderen wat geloof betekent. Er is altijd ruimte voor vragen en verwondering.</p>
      <h3>Wanneer?</h3>
      <p>Elke <strong>derde zondag van de maand</strong> tijdens de viering van 11&nbsp;uur in de Kerk van Goede Bijstand.</p>
      <p><a onclick="navigate('contact')">Neem contact op voor meer info &#8594;</a></p>
    </section>` },

  mosterdzaadjes: { title:'Mosterdzaadjes', content:`
    <section>
      <div class="breadcrumb"><a onclick="navigate('home')">Home</a> <span>&#8250;</span> <a onclick="navigate('kinderen')">Kinderen &amp; Jongeren</a> <span>&#8250;</span> Mosterdzaadjes</div>
      <h2>&#x1F331; Mosterdzaadjes</h2>
      <p>Mosterdzaadjes is de kindernevendienst voor de allerkleinsten &mdash; peuters en kleuters. Net als het mosterdzaadje: klein van begin, maar vol leven.</p>
      <h3>Wat doen we?</h3>
      <p>In een veilige, rustige omgeving worden de kleintjes op een speelse manier vertrouwd gemaakt met geloof, gemeenschap en verhalen.</p>
      <h3>Wanneer?</h3>
      <p>Elke <strong>derde zondag van de maand</strong> tijdens de viering van 11&nbsp;uur.</p>
      <p><a onclick="navigate('contact')">Neem contact op voor meer info &#8594;</a></p>
    </section>` },

  samenwerking: { title:'Samenwerking', content:`
    <section>
      <div class="breadcrumb"><a onclick="navigate('home')">Home</a> <span>&#8250;</span> Samenwerking</div>
      <h2>Samenwerking</h2>
      <p>De Kerk van Goede Bijstand werkt samen met verschillende organisaties die de Brusselse geloofsgemeenschap versterken.</p>
      <div class="partners">
        <div class="partner-item"><strong>Kamino &ndash; Jongerennetwerk</strong><p>Kamino is het jongerennetwerk van de katholieke kerk in Brussel. Het brengt jongeren samen rondom geloof, zingeving en engagement in de stad. <a href="https://www.kamino.be" target="_blank">www.kamino.be &#8594;</a></p></div>
        <div class="partner-item"><strong>Bijstandsnetwerk Brussel</strong><p>Het Bijstandsnetwerk co&#246;rdineert de Nederlandstalige pastoraal in Brussel centrum. Secretariaat: Bijstandsstraat 5, 1000 Brussel.</p></div>
        <div class="partner-item"><strong>Finis Terrae</strong><p>Zustergemeenschap aan de Nieuwstraat 76. Elke zaterdag om 16.30&nbsp;uur viering.</p></div>
        <div class="partner-item"><strong>Taiz&#233;</strong><p>Maandelijks een gebedsavond in de geest van Taiz&#233;, open voor iedereen. <a onclick="navigate('home')">Meer info &#8594;</a></p></div>
        <div class="partner-item"><strong>Paulusgemeenschappen</strong><p>Netwerk van geloofsgemeenschappen in Vlaanderen en Brussel, ge&#239;nspireerd door de apostel Paulus. <a href="https://www.paulusgemeenschappen.be/nl" target="_blank">www.paulusgemeenschappen.be &#8594;</a></p></div>
      </div>
    </section>` },

        <p style="font-size:0.95rem;color:var(--muted);">Het is met droefheid dat we het overlijden meedelen van Paul Huyskens, een trouw lid van onze parochiegemeenschap. We bidden voor hem en voor zijn familie en naasten.</p>

  homilie: { title:'Homilie — Kerstmis 2025', content:`
    <section>
      <div class="breadcrumb"><a onclick="navigate('home')">Home</a> <span>&#8250;</span> <a onclick="navigate('vieringen')">Vieringen</a> <span>&#8250;</span> Homilies</div>
      <h2>Kerstmis: moet ik zwijgen?</h2>
      <p><em>Kerstmis, 25 december 2025 &mdash; Pastoor Johnny De Mot</em></p>
      <div class="homilie">
        <p>&#8220;Moet ik zwijgen?&#8221; &mdash; Dat is de vraag die me bezighoudt deze Kerstmis. We leven in een wereld vol lawaai, vol meningen, vol stellige uitspraken. En toch is het Kind in de kribbe stil. Het spreekt niet. Het is er gewoon.</p>
        <p>Kerstmis nodigt ons uit om even te stoppen. Om niet meteen te duiden, te verklaren, te verdedigen. Om aanwezig te zijn, zoals de herders, zoals de Wijzen &mdash; verward, maar in beweging. Op weg naar iets waarvan ze de naam nauwelijks kennen.</p>
        <p>Misschien is het meest eerlijke wat we kunnen doen vandaag: zwijgen. En luisteren. Naar het Kind. Naar elkaar. Naar wat er leeft in onze eigen ziel, diep onder de drukte van de feestdagen.</p>
        <p>Want ook in ons is er een plek die stil wil zijn. Die wacht. Die hoopt. Die gelooft &mdash; soms nauwelijks, maar toch.</p>
        <p>Gelukkig Kerstfeest. &#x271D;</p>
      </div>
      <p style="margin-top:1.5rem;"><a onclick="navigate('vieringen')">&#8592; Terug naar vieringen</a></p>
    </section>` },

  bezinning: { title:'Koud Gepakt, Warm Gedragen', content:`
    <section>
      <div class="breadcrumb"><a onclick="navigate('home')">Home</a> <span>&#8250;</span> <a onclick="navigate('vieringen')">Vieringen</a> <span>&#8250;</span> Bezinningsteksten</div>
      <h2>Koud Gepakt, Warm Gedragen</h2>
      <p><em>Bezinningstekst &mdash; 21 september 2025</em></p>
      <div class="homilie">
        <p>De herfst valt vroeg dit jaar. De morgens zijn al grijs wanneer we de deur opendoen. En toch: er is iets dat ons warm houdt. Niet de verwarming, niet de koffie &mdash; maar de mensen om ons heen.</p>
        <p>&#8220;Koud gepakt, warm gedragen.&#8221; Zo voelt het aan wanneer het leven je verrast met verlies, met moeilijkheid. En dan is er iemand die er is. Die zwijgt of spreekt, maar aanwezig is.</p>
        <p>In de Bijbel heet dat: troost. Niet als sentimenteel gebaar, maar als echte nabijheid van God &mdash; doorheen mensen, doorheen stilte, doorheen brood en wijn gedeeld aan een tafel.</p>
        <p>Moge u deze herfst gedragen worden &mdash; koud gepakt als het moet, maar nooit alleen.</p>
      </div>
      <p style="margin-top:1.5rem;"><a onclick="navigate('vieringen')">&#8592; Terug naar vieringen</a></p>
    </section>` }

// ── Subnav Vieringen
function showVierSub(k) {
  document.querySelectorAll('.vsub').forEach(el => el.style.display='none');
  const t = document.getElementById('vsub-'+k); if(t) t.style.display='block';
  document.querySelectorAll('[data-vsub]').forEach(a => a.classList.toggle('subnav-active', a.dataset.vsub===k));
}

// ── Subnav De Goede Bijstand
function showSub(k) {
  document.querySelectorAll('.subpage').forEach(el => el.style.display='none');
  const t = document.getElementById('sub-'+k); if(t) t.style.display='block';
  document.querySelectorAll('.subnav a').forEach(a => a.classList.toggle('subnav-active', a.dataset.sub===k));
}

// ── Subnav Activiteiten
function showActSub(k) {
  ['overzicht','fotos'].forEach(id => {
    const el = document.getElementById('asub-'+id);
    if(el) el.style.display = (id===k) ? 'block' : 'none';
  });
  document.querySelectorAll('[data-asub]').forEach(a => a.classList.toggle('act-actief', a.dataset.asub===k));
}

// ── Navigatie
function navigate(pageKey) {
  const page = pages[pageKey]; if(!page) return;
  document.getElementById('main-content').innerHTML = page.content;
  document.getElementById('sidebar').innerHTML = getSidebar();
  document.title = page.title + ' \u2014 Onze-Lieve-Vrouw van Goede Bijstand';
  document.querySelectorAll('nav a').forEach(a => a.classList.toggle('active', a.dataset.page===pageKey));
  window.scrollTo({top:0, behavior:'smooth'});
}

navigate('home');
</script>
